name: Scrape DRAM Prices

# Schedule disabled — DRAMeXchange blocks GitHub Actions IPs via Cloudflare.
# Use the bookmarklet (bookmarklet.html) instead.
# Manual trigger kept for testing only.
on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Scrape and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: nlee756525
          GITHUB_REPO: dram-prices
        run: python scrape.py
