name: Scrape DRAM Prices

on:
  schedule:
    - cron: '30 10 * * 1-5'  # 6:30 AM ET (10:30 UTC), weekdays only
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run scraper
        id: scrape
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scrape.py 2>&1 | tee scrape-last-run.log
          exit ${PIPESTATUS[0]}

      - name: Commit log to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase || true
          git add -f scrape-last-run.log
          git diff --staged --quiet || git commit -m "debug: scrape log $(date -u +'%Y-%m-%dT%H:%M')"
          git push || true

      - name: Upload debug screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-debug-${{ github.run_id }}
          path: scrape-debug.png
          if-no-files-found: ignore
          retention-days: 14

      - name: Fail if scraper failed
        if: steps.scrape.conclusion == 'failure'
        run: exit 1
