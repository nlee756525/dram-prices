<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DRAM &amp; NAND Flash Spot Prices</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

    /* ── Header ── */
    header { background: #0d1117; border-bottom: 1px solid #21262d; padding: 1.4rem 2rem; text-align: center; }
    header h1 { font-size: 1.6rem; font-weight: 700; color: #f8fafc; margin-bottom: .4rem; }
    .header-meta { font-size: .78rem; color: #64748b; display: flex; justify-content: center; align-items: center; gap: .85rem; flex-wrap: wrap; }
    .header-meta a { color: #60a5fa; text-decoration: none; }
    .header-meta a:hover { text-decoration: underline; }
    .dot { color: #334155; }

    /* ── Layout ── */
    main { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* ── Section dividers ── */
    .divider { display: flex; align-items: center; gap: .75rem; margin: 2rem 0 1.25rem; }
    .divider:first-child { margin-top: 0; }
    .divider span { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.6px; color: #475569; white-space: nowrap; }
    .divider::after { content: ''; flex: 1; height: 1px; background: #1e293b; }

    /* ── Latest cards ── */
    .latest-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: .5rem; }
    .latest-card { border-radius: 12px; padding: 1.25rem 1.5rem; border: 1px solid; }
    .latest-card.dram { background: #0d1f3c; border-color: #1e40af; }
    .latest-card.nand { background: #052e16; border-color: #166534; }
    .latest-card.empty { background: #1e293b; border-color: #334155; color: #475569; display: flex; align-items: center; justify-content: center; min-height: 7rem; font-size: .9rem; grid-column: 1/-1; }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; gap: .5rem; flex-wrap: wrap; }
    .card-title { display: flex; align-items: center; gap: .6rem; }
    .card-name { font-size: .95rem; font-weight: 600; color: #f1f5f9; }
    .card-sub  { font-size: .72rem; color: #64748b; margin-top: .1rem; }
    .card-date { font-size: .74rem; color: #94a3b8; background: rgba(0,0,0,.3); padding: .2rem .65rem; border-radius: 999px; border: 1px solid #334155; white-space: nowrap; }

    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .55rem; }
    .stat { background: rgba(0,0,0,.3); border-radius: 8px; padding: .6rem .8rem; }
    .stat-label { font-size: .6rem; text-transform: uppercase; letter-spacing: .5px; color: #64748b; margin-bottom: .25rem; }
    .stat-value { font-size: 1rem; font-weight: 600; color: #e2e8f0; font-variant-numeric: tabular-nums; }

    /* ── Chips ── */
    .chip { padding: .22rem .65rem; border-radius: 6px; font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
    .chip-dram { background: #1d4ed8; color: #bfdbfe; }
    .chip-nand { background: #065f46; color: #a7f3d0; }

    /* ── Colors ── */
    .up   { color: #4ade80; }
    .down { color: #f87171; }
    .flat { color: #94a3b8; }

    /* ── History sections ── */
    .hist-section { margin-bottom: 2.5rem; }
    .hist-header { display: flex; align-items: center; gap: .75rem; margin-bottom: .85rem; }
    .hist-header h3 { font-size: 1rem; font-weight: 600; color: #f1f5f9; }
    .hist-header .sub { font-size: .75rem; color: #64748b; }

    /* ── Tables ── */
    .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid #334155; }
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    thead tr { background: #1e3a5f; }
    thead th { padding: .7rem 1rem; text-align: right; font-weight: 600; font-size: .7rem; text-transform: uppercase; letter-spacing: .5px; color: #93c5fd; white-space: nowrap; border-bottom: 2px solid #334155; }
    thead th:first-child { text-align: left; }
    tbody tr:nth-child(odd)  { background: #141b2d; }
    tbody tr:nth-child(even) { background: #1a2438; }
    tbody tr:hover           { background: #1e3050; }
    tbody tr:last-child td   { border-bottom: none; }
    tbody td { padding: .6rem 1rem; text-align: right; border-bottom: 1px solid #1e293b; font-variant-numeric: tabular-nums; color: #cbd5e1; white-space: nowrap; }
    tbody td:first-child { text-align: left; color: #94a3b8; font-size: .82rem; }

    /* Highlight the newest (top) row */
    tbody tr.row-newest td { background: #182844; color: #f1f5f9; font-weight: 600; }
    tbody tr.row-newest td:first-child { color: #f1f5f9; }

    .chg { font-weight: 700; }
    .new-tag { display: inline-block; background: #1d4ed8; color: #bfdbfe; font-size: .58rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; padding: .1rem .4rem; border-radius: 4px; margin-left: .4rem; vertical-align: middle; }
    .empty-msg { color: #475569; font-size: .85rem; padding: 1.5rem; text-align: center; }

    /* ── Footer ── */
    footer { text-align: center; font-size: .72rem; color: #475569; padding: 1.5rem 0 2rem; border-top: 1px solid #1e293b; }
    footer a { color: #60a5fa; text-decoration: none; }

    @media (max-width: 600px) {
      .latest-grid { grid-template-columns: 1fr; }
      .stats-grid  { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <h1>DRAM &amp; NAND Flash Spot Prices</h1>
  <div class="header-meta">
    <span id="hdr-date">Loading…</span>
    <span class="dot">&middot;</span>
    <a href="https://www.dramexchange.com/" target="_blank" rel="noopener">DRAMeXchange / TrendForce</a>
    <span class="dot">&middot;</span>
    <a href="update.html">+ Add Entry</a>
  </div>
</header>

<main>

  <!-- ═══════════════ LATEST UPDATE (TOP) ═══════════════ -->
  <div class="divider"><span>Latest Update</span></div>
  <div class="latest-grid" id="latest-grid">
    <div class="latest-card empty">Loading data…</div>
  </div>

  <!-- ═══════════════ PRICE HISTORY (BOTTOM) ════════════ -->
  <div class="divider"><span>Price History</span></div>

  <div class="hist-section" id="ddr5-section"></div>
  <div class="hist-section" id="tlc-section"></div>

</main>

<footer>
  Prices in USD &middot; Source: <a href="https://www.dramexchange.com/" target="_blank" rel="noopener">DRAMeXchange / TrendForce</a>
</footer>

<script>
(function () {
  'use strict';

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function dir(v) {
    var s = String(v || '');
    var n = parseFloat(s.replace(/[^0-9.\-+]/g, ''));
    if (isNaN(n)) return s.indexOf('+') > -1 ? 'up' : s.indexOf('-') > -1 ? 'down' : 'flat';
    return n > 0 ? 'up' : n < 0 ? 'down' : 'flat';
  }

  function arrow(d) {
    return d === 'up' ? '&#9650;&thinsp;' : d === 'down' ? '&#9660;&thinsp;' : '';
  }

  function latestCard(row, type, name, sub) {
    if (!row) return '<div class="latest-card empty">No data yet.</div>';
    var d = dir(row.session_change);
    return '<div class="latest-card ' + type + '">'
      + '<div class="card-top">'
        + '<div class="card-title">'
          + '<span class="chip chip-' + type + '">' + type.toUpperCase() + '</span>'
          + '<div><div class="card-name">' + esc(name) + '</div>'
          + '<div class="card-sub">' + esc(sub) + '</div></div>'
        + '</div>'
        + '<span class="card-date">' + esc(row.date) + '</span>'
      + '</div>'
      + '<div class="stats-grid">'
        + mkStat('Weekly High',    row.weekly_high,    '')
        + mkStat('Weekly Low',     row.weekly_low,     '')
        + mkStat('Session High',   row.session_high,   '')
        + mkStat('Session Low',    row.session_low,    '')
        + mkStat('Session Avg',    row.session_avg,    '')
        + mkStat('Avg Change',     row.session_change, d)
      + '</div>'
    + '</div>';
  }

  function mkStat(label, val, cls) {
    var v = cls ? '<span class="' + cls + '">' + (cls !== '' ? arrow(cls) : '') + esc(val) + '</span>' : esc(val);
    return '<div class="stat"><div class="stat-label">' + label + '</div><div class="stat-value">' + v + '</div></div>';
  }

  function histTable(rows) {
    if (!rows || !rows.length) return '<p class="empty-msg">No history yet.</p>';
    var rev = rows.slice().reverse();
    var trs = rev.map(function (r, i) {
      var d = dir(r.session_change);
      var isNew = i === 0;
      var dateCell = esc(r.date) + (isNew ? '<span class="new-tag">latest</span>' : '');
      return '<tr' + (isNew ? ' class="row-newest"' : '') + '>'
        + '<td>' + dateCell + '</td>'
        + '<td>' + esc(r.weekly_high)    + '</td>'
        + '<td>' + esc(r.weekly_low)     + '</td>'
        + '<td>' + esc(r.session_high)   + '</td>'
        + '<td>' + esc(r.session_low)    + '</td>'
        + '<td>' + esc(r.session_avg)    + '</td>'
        + '<td class="chg ' + d + '">' + arrow(d) + esc(r.session_change) + '</td>'
      + '</tr>';
    }).join('');
    return '<div class="table-wrap"><table>'
      + '<thead><tr>'
      + '<th>Date</th><th>Wkly High</th><th>Wkly Low</th>'
      + '<th>Sess High</th><th>Sess Low</th><th>Sess Avg</th><th>Avg Change</th>'
      + '</tr></thead>'
      + '<tbody>' + trs + '</tbody>'
      + '</table></div>';
  }

  function histSection(el, rows, type, name, sub) {
    el.innerHTML =
      '<div class="hist-header">'
        + '<span class="chip chip-' + type + '">' + type.toUpperCase() + '</span>'
        + '<h3>' + esc(name) + '</h3>'
        + '<span class="sub">' + esc(sub) + '</span>'
      + '</div>'
      + histTable(rows);
  }

  function render(data) {
    var ld = data.ddr5[data.ddr5.length - 1] || null;
    var lt = data.tlc[data.tlc.length  - 1] || null;

    document.getElementById('hdr-date').textContent =
      'Last updated: ' + (ld ? ld.date : '—');

    document.getElementById('latest-grid').innerHTML =
      latestCard(ld, 'dram', 'DDR5 16Gb (2Gx8)', '4800 / 5600 MHz') +
      latestCard(lt, 'nand', '512Gb TLC', 'NAND Flash Wafer');

    histSection(document.getElementById('ddr5-section'),
      data.ddr5, 'dram', 'DDR5 16Gb (2Gx8)', '4800 / 5600 MHz');

    histSection(document.getElementById('tlc-section'),
      data.tlc, 'nand', '512Gb TLC', 'NAND Flash Wafer');
  }

  fetch('history.json?_=' + Date.now())
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(render)
    .catch(function (err) {
      document.getElementById('latest-grid').innerHTML =
        '<div class="latest-card empty">Failed to load data: ' + esc(err.message) + '</div>';
    });
})();
</script>
</body>
</html>
