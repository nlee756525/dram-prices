<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DRAM &amp; NAND Flash Spot Prices</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0e1a; color: #e2e8f0; min-height: 100vh; }

    /* ── Header ── */
    header {
      background: #0d1117;
      border-bottom: 1px solid #1e293b;
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .5rem;
    }
    header h1 { font-size: 1.15rem; font-weight: 700; color: #f8fafc; }
    .hdr-right { font-size: .74rem; color: #475569; display: flex; gap: .85rem; align-items: center; flex-wrap: wrap; }
    .hdr-right a { color: #60a5fa; text-decoration: none; }
    .hdr-right a:hover { text-decoration: underline; }
    #hdr-updated { color: #64748b; }

    /* ── Main ── */
    main { max-width: 1400px; margin: 0 auto; padding: 1.75rem 1.25rem 4rem; }

    /* ════════════════════════════════════════
       LATEST UPDATE — top of page
    ════════════════════════════════════════ */
    .latest-section {
      margin-bottom: 2.5rem;
    }

    .latest-heading {
      display: flex; align-items: center; gap: .65rem; margin-bottom: 1rem; flex-wrap: wrap;
    }
    .pulse-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: #3b82f6; box-shadow: 0 0 8px #3b82f6;
      animation: pulse 2s ease-in-out infinite; flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 4px #3b82f6; opacity: 1; }
      50%       { box-shadow: 0 0 14px #60a5fa; opacity: .85; }
    }
    .latest-heading h2 {
      font-size: 1rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.5px; color: #93c5fd;
    }
    .latest-date-pill {
      font-size: .8rem; font-weight: 600; color: #e2e8f0;
      background: rgba(30, 58, 138, 0.35); border: 1px solid #2563eb;
      padding: .22rem .75rem; border-radius: 999px;
    }
    .latest-sub-dates {
      margin-left: auto; font-size: .7rem; color: #475569;
    }
    .latest-sub-dates strong { color: #64748b; font-weight: 600; }

    .latest-cards {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1.1rem;
    }

    .price-card {
      border-radius: 14px; padding: 1.25rem 1.4rem; border: 1px solid; position: relative; overflow: hidden;
    }
    .price-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    }
    .price-card.dram { background: rgba(13, 28, 58, 0.8); border-color: #1e3a8a; }
    .price-card.dram::before { background: linear-gradient(90deg, #1d4ed8, #3b82f6); }
    .price-card.nand { background: rgba(5, 40, 22, 0.8); border-color: #14532d; }
    .price-card.nand::before { background: linear-gradient(90deg, #15803d, #22c55e); }
    .price-card.empty {
      background: #111827; border-color: #1e293b; color: #334155;
      display: flex; align-items: center; justify-content: center;
      min-height: 6rem; font-size: .88rem; grid-column: 1 / -1;
    }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; gap: .5rem; }
    .card-identity { display: flex; align-items: center; gap: .55rem; }
    .chip { display: inline-block; padding: .2rem .55rem; border-radius: 6px; font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
    .chip-dram { background: #1d4ed8; color: #bfdbfe; }
    .chip-nand { background: #166534; color: #a7f3d0; }
    .card-name { font-size: .92rem; font-weight: 600; color: #f1f5f9; }
    .card-spec { font-size: .68rem; color: #64748b; margin-top: .1rem; }
    .card-entry-date { font-size: .72rem; color: #475569; white-space: nowrap; margin-top: .15rem; }

    .fields-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .5rem; }
    .field { background: rgba(0,0,0,.3); border-radius: 8px; padding: .5rem .7rem; }
    .field-label { font-size: .56rem; text-transform: uppercase; letter-spacing: .5px; color: #475569; margin-bottom: .2rem; }
    .field-value { font-size: .94rem; font-weight: 600; color: #e2e8f0; font-variant-numeric: tabular-nums; }

    .up   { color: #4ade80; }
    .down { color: #f87171; }
    .flat { color: #64748b; }

    /* ════════════════════════════════════════
       HISTORY — running list below
    ════════════════════════════════════════ */
    .history-section { }

    .history-heading {
      display: flex; align-items: center; gap: .75rem; margin-bottom: 1.25rem; flex-wrap: wrap;
    }
    .history-heading h2 {
      font-size: .72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.8px; color: #334155;
    }
    .history-heading::after { content: ''; flex: 1; height: 1px; background: #1e293b; }

    .history-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; align-items: start; }
    .history-col { min-width: 0; }

    .col-label {
      display: flex; align-items: center; gap: .55rem; margin-bottom: .65rem; flex-wrap: wrap;
    }
    .col-label h3 { font-size: .88rem; font-weight: 600; color: #cbd5e1; }
    .col-label .col-sub { font-size: .68rem; color: #475569; }
    .entry-count {
      font-size: .62rem; color: #334155; background: #0f172a;
      border: 1px solid #1e293b; border-radius: 999px; padding: .05rem .42rem;
    }

    /* tables */
    .tbl-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid #1e293b; }
    table { width: 100%; border-collapse: collapse; font-size: .8rem; }
    thead tr { background: #0f1e38; }
    thead th {
      padding: .48rem .65rem; text-align: right;
      font-size: .6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .4px; color: #60a5fa; white-space: nowrap;
      border-bottom: 1px solid #1e293b;
    }
    thead th:first-child { text-align: left; }
    tbody tr:nth-child(odd)  { background: #0d1117; }
    tbody tr:nth-child(even) { background: #111827; }
    tbody tr:hover { background: #162032; }
    tbody td {
      padding: .35rem .65rem; text-align: right;
      border-bottom: 1px solid #0f172a;
      font-variant-numeric: tabular-nums; color: #94a3b8; white-space: nowrap;
    }
    tbody td:first-child { text-align: left; color: #64748b; font-size: .76rem; }
    tbody tr:last-child td { border-bottom: none; }

    /* latest row */
    tbody tr.row-latest td { background: #0f2040 !important; }
    tbody tr.row-latest td:first-child { color: #93c5fd; font-weight: 600; }
    .new-tag {
      display: inline-block; background: #1d4ed8; color: #bfdbfe;
      font-size: .5rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .3px; padding: .06rem .3rem; border-radius: 3px;
      margin-left: .28rem; vertical-align: middle;
    }

    .chg { font-weight: 700; }
    .empty-row { color: #334155; font-size: .82rem; padding: 1.5rem; text-align: center; }

    /* ── Footer ── */
    footer { text-align: center; font-size: .7rem; color: #1e293b; padding: 1.5rem 0 2.5rem; border-top: 1px solid #0f172a; }
    footer a { color: #334155; text-decoration: none; }
    footer a:hover { color: #60a5fa; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .history-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .latest-cards { grid-template-columns: 1fr; }
      .fields-grid  { grid-template-columns: repeat(2, 1fr); }
      main { padding: 1.25rem .85rem 3rem; }
      header { padding: .85rem 1rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>DRAM &amp; NAND Flash Spot Prices</h1>
  <div class="hdr-right">
    <span id="hdr-updated">Loading…</span>
    <a href="https://www.dramexchange.com/" target="_blank" rel="noopener">DRAMeXchange / TrendForce</a>
    <a href="update.html">+ Add Entry</a>
  </div>
</header>

<main>

  <!-- ════════════════════════════════════════
       LATEST UPDATE — always first
  ════════════════════════════════════════ -->
  <section class="latest-section">
    <div class="latest-heading">
      <div class="pulse-dot"></div>
      <h2>Latest Update</h2>
      <span class="latest-date-pill" id="latest-date-pill">—</span>
      <span class="latest-sub-dates" id="latest-sub-dates"></span>
    </div>
    <div class="latest-cards" id="latest-cards">
      <div class="price-card empty">Loading…</div>
    </div>
  </section>

  <!-- ════════════════════════════════════════
       PRICE HISTORY — running list
  ════════════════════════════════════════ -->
  <section class="history-section">
    <div class="history-heading">
      <h2>Price History &mdash; All Entries</h2>
    </div>
    <div class="history-grid">
      <div class="history-col" id="ddr5-col"></div>
      <div class="history-col" id="tlc-col"></div>
    </div>
  </section>

</main>

<footer>
  Prices in USD &middot; Source:
  <a href="https://www.dramexchange.com/" target="_blank" rel="noopener">DRAMeXchange / TrendForce</a>
</footer>

<script>
(function () {
  'use strict';

  var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function fmtDate(s) {
    var p = String(s || '').split('/');
    if (p.length !== 3) return s;
    var m = parseInt(p[0], 10) - 1, d = parseInt(p[1], 10);
    if (isNaN(m) || isNaN(d) || m < 0 || m > 11) return s;
    return MONTHS[m] + ' ' + d + ', ' + p[2];
  }

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function changeDir(v) {
    var n = parseFloat(String(v || '').replace(/[^0-9.\-+]/g, ''));
    if (isNaN(n)) { var s = String(v||''); return s.indexOf('+')>-1?'up':s.indexOf('-')>-1?'down':'flat'; }
    return n > 0 ? 'up' : n < 0 ? 'down' : 'flat';
  }

  function arrow(d) {
    return d === 'up' ? '&#9650;&thinsp;' : d === 'down' ? '&#9660;&thinsp;' : '';
  }

  function field(label, val, cls) {
    var inner = cls
      ? '<span class="' + cls + '">' + arrow(cls) + esc(val) + '</span>'
      : esc(val);
    return '<div class="field">'
      + '<div class="field-label">' + label + '</div>'
      + '<div class="field-value">' + inner + '</div>'
      + '</div>';
  }

  function buildCard(row, type, name, spec) {
    if (!row) {
      return '<div class="price-card empty">No data yet.</div>';
    }
    var d = changeDir(row.session_change);
    return '<div class="price-card ' + type + '">'
      + '<div class="card-top">'
        + '<div class="card-identity">'
          + '<span class="chip chip-' + type + '">' + type.toUpperCase() + '</span>'
          + '<div>'
            + '<div class="card-name">' + esc(name) + '</div>'
            + '<div class="card-spec">' + esc(spec)  + '</div>'
          + '</div>'
        + '</div>'
        + '<div class="card-entry-date">' + esc(fmtDate(row.date)) + '</div>'
      + '</div>'
      + '<div class="fields-grid">'
        + field('Weekly High',     row.weekly_high)
        + field('Weekly Low',      row.weekly_low)
        + field('Session High',    row.session_high)
        + field('Session Low',     row.session_low)
        + field('Session Average', row.session_avg)
        + field('Avg Change',      row.session_change, d)
      + '</div>'
    + '</div>';
  }

  function buildTable(rows) {
    if (!rows || !rows.length) {
      return '<p class="empty-row">No history yet.</p>';
    }
    var rev = rows.slice().reverse();
    var trs = rev.map(function (r, i) {
      var d = changeDir(r.session_change);
      var isLatest = i === 0;
      var dateCell = esc(fmtDate(r.date))
        + (isLatest ? '<span class="new-tag">latest</span>' : '');
      return '<tr' + (isLatest ? ' class="row-latest"' : '') + '>'
        + '<td>' + dateCell + '</td>'
        + '<td>' + esc(r.weekly_high)  + '</td>'
        + '<td>' + esc(r.weekly_low)   + '</td>'
        + '<td>' + esc(r.session_high) + '</td>'
        + '<td>' + esc(r.session_low)  + '</td>'
        + '<td>' + esc(r.session_avg)  + '</td>'
        + '<td class="chg ' + d + '">' + arrow(d) + esc(r.session_change) + '</td>'
      + '</tr>';
    }).join('');
    return '<div class="tbl-wrap"><table>'
      + '<thead><tr>'
      + '<th>Date</th>'
      + '<th>Wk High</th><th>Wk Low</th>'
      + '<th>Sess High</th><th>Sess Low</th>'
      + '<th>Sess Avg</th><th>Chg %</th>'
      + '</tr></thead>'
      + '<tbody>' + trs + '</tbody>'
      + '</table></div>';
  }

  function buildCol(el, rows, type, name, spec) {
    el.innerHTML =
      '<div class="col-label">'
        + '<span class="chip chip-' + type + '">' + type.toUpperCase() + '</span>'
        + '<h3>' + esc(name) + '</h3>'
        + '<span class="col-sub">' + esc(spec) + '</span>'
        + '<span class="entry-count">' + (rows ? rows.length : 0) + ' entries</span>'
      + '</div>'
      + buildTable(rows);
  }

  function render(data) {
    var latestDDR5 = data.ddr5[data.ddr5.length - 1] || null;
    var latestTLC  = data.tlc[data.tlc.length  - 1] || null;

    /* header last-updated */
    document.getElementById('hdr-updated').textContent =
      'Last updated: ' + (latestDDR5 ? fmtDate(latestDDR5.date) : '—');

    /* date pill — use DDR5 date (updates daily) */
    document.getElementById('latest-date-pill').textContent =
      latestDDR5 ? fmtDate(latestDDR5.date) : '—';

    /* sub-dates when DDR5 and TLC are on different dates */
    var subParts = [];
    if (latestDDR5 && latestTLC && latestDDR5.date !== latestTLC.date) {
      subParts.push('DDR5: <strong>' + esc(fmtDate(latestDDR5.date)) + '</strong>');
      subParts.push('TLC: <strong>'  + esc(fmtDate(latestTLC.date))  + '</strong>');
      document.getElementById('latest-sub-dates').innerHTML = subParts.join('&nbsp;&nbsp;&middot;&nbsp;&nbsp;');
    }

    /* latest price cards */
    document.getElementById('latest-cards').innerHTML =
      buildCard(latestDDR5, 'dram', 'DDR5 16Gb (2Gx8)', '4800 / 5600 MHz') +
      buildCard(latestTLC,  'nand', '512Gb TLC', 'NAND Flash Wafer');

    /* running history tables */
    buildCol(document.getElementById('ddr5-col'),
      data.ddr5, 'dram', 'DDR5 16Gb (2Gx8)', '4800 / 5600 MHz');
    buildCol(document.getElementById('tlc-col'),
      data.tlc, 'nand', '512Gb TLC', 'NAND Flash Wafer');
  }

  fetch('history.json?_=' + Date.now())
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(render)
    .catch(function (err) {
      document.getElementById('latest-cards').innerHTML =
        '<div class="price-card empty">Failed to load data: ' + esc(err.message) + '</div>';
    });
})();
</script>
</body>
</html>
